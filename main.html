<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Styling Test</title>

  <style>
    /* Container styling */
    .main {
      width: 200px;
      background-color: purple;
      border-left: 5px solid green;
      padding: 10px;
    }

    /* Heading styling */
    #heading {
      font-size: 20px;
      color: white;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="main">
    <h1 id="heading" class="heading">This is a Heading</h1>
  </div>

</body>
</html>
